spring.application.name=ecom-application
product.fakestore.api.url=https://fakestoreapi.com/products
cart.fakestore.api.url=https://fakestoreapi.com/carts
user.fakestore.api.url=https://fakestoreapi.com/users
auth.fakestore.api.url=https://fakestoreapi.com/auth/login

spring.datasource.url=jdbc:mysql://localhost:3306/ecom_db
spring.datasource.username=root
spring.datasource.password=YOUR_DB_PASSWORD

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
stripe.secret.key=YOUR_SECRET_KEY